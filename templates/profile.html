{% extends "layout.html" %} {% block title %}Profile{% endblock %} {% block
content %}

<div class="profile-container">
  <h1 class="profile-title">My Profile</h1>

  <div class="profile-card">
    <div class="profile-avatar">{{ user['name'][0]|upper }}</div>

    <div class="profile-info">
      <div class="profile-row">
        <span>Name</span>
        <p>{{ user['name'] }}</p>
      </div>

      <div class="profile-row">
        <span>Email</span>
        <p>{{ user['email'] }}</p>
      </div>

      <div class="profile-row">
        <span>Phone</span>
        <p>{{ user['phone'] }}</p>
      </div>
    </div>

    <a href="{{ url_for('edit_profile') }}" class="profile-btn">
      Edit Profile
    </a>
  </div>
</div>

{% endblock %}
